name: pipeline-2-core

on:
  workflow_dispatch:

env:
  CLUSTER_NAME: cluster-blockchain
  CLUSTER_ZONE: us-central1-a
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  TF_WORKING_DIR: blockchain/infraestructura/terraform/terraform-cluster
  K8S_CORE_DIR: blockchain/infraestructura/k8s/core
  K8S_INGRESS_DIR: blockchain/infraestructura/k8s/ingress
  K8S_MONITORING_DIR: blockchain/infraestructura/k8s/monitoring

jobs:
  deploy-core:
    name: Deploy Core Infrastructure (Redis + RabbitMQ + Ingress + Monitoring)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Auth GCP
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          install_components: gke-gcloud-auth-plugin

      # Terraform (para outputs)
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Get Terraform outputs
        run: |
          cd $TF_WORKING_DIR
          terraform init -input=false
          echo "INGRESS_IP=$(terraform output -raw ingress_ip)" >> $GITHUB_ENV

      # Instalar Helm
      - name: Install Helm
        uses: azure/setup-helm@v4

      # Get kubeconfig
      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials $CLUSTER_NAME \
            --zone $CLUSTER_ZONE \
            --project $PROJECT_ID

      # Namespace monitoring
      - name: Create monitoring namespace
        run: |
          kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -

      # ===============================
      # Crear ConfigMap TCP para Rabbit
      # ===============================
      - name: Create TCP ConfigMap for RabbitMQ
        run: |
          kubectl create namespace ingress-nginx --dry-run=client -o yaml | kubectl apply -f -

          kubectl create configmap tcp-services \
            --namespace ingress-nginx \
            --from-literal=5672=blockchain-infra/rabbitmq:5672 \
            --dry-run=client -o yaml | kubectl apply -f -

      # ====================================
      # Install RabbitMQ Cluster Operator (kubectl apply)
      # ====================================
      - name: Install RabbitMQ Cluster Operator
        run: |
          kubectl apply -f https://github.com/rabbitmq/cluster-operator/releases/latest/download/cluster-operator.yml

      - name: Wait for RabbitMQ Operator to be ready
        run: |
          kubectl rollout status deployment/rabbitmq-cluster-operator \
            -n rabbitmq-system --timeout=300s

      # Delete existing ingress Service to avoid Helm conflict
      - name: Delete existing ingress Service (avoid Helm conflict)
        run: |
          kubectl delete svc ingress-nginx-controller \
            -n ingress-nginx \
            --ignore-not-found=true

      # ===============================
      # Instalar Ingress NGINX
      # ===============================
      - name: Install Ingress Controller
        run: |
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo update

          helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
          --namespace ingress-nginx \
          --create-namespace \
          -f $K8S_INGRESS_DIR/values.yaml

      - name: Patch Ingress Service (Rabbit TCP)
        run: |
          envsubst < $K8S_INGRESS_DIR/ingress-nginx-service.yaml | kubectl apply -f -

      - name: Restart Ingress Controller
        run: |
          kubectl rollout restart deployment ingress-nginx-controller -n ingress-nginx

      # ====================================
      # Create GHCR Image Pull Secret
      # ====================================
      - name: Create GHCR Secret
        run: |
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ secrets.GHCR_USERNAME }} \
            --docker-password=${{ secrets.GHCR_TOKEN }} \
            --namespace blockchain-infra \
            --dry-run=client -o yaml | kubectl apply -f -

      # ====================================
      # Create blockchain-ingress-config
      # ====================================
      - name: Create Ingress ConfigMap
        run: |
          kubectl create configmap blockchain-ingress-config \
            --namespace blockchain-infra \
            --from-literal=INGRESS_HOST=${INGRESS_IP}\
            --dry-run=client -o yaml | kubectl apply -f -

      # ====================================
      # Core (Redis + RabbitMQ)
      # ====================================
      - name: Apply Core Manifests
        run: |
          kubectl apply -k $K8S_CORE_DIR

      # Esperar Rabbit
      - name: Wait for RabbitMQ
        run: |
          kubectl wait --for=condition=AllReplicasReady rabbitmqcluster/rabbitmq \
            -n blockchain-infra --timeout=300s

      - name: Wait for Ingress Controller
        run: |
          kubectl rollout status deployment/ingress-nginx-controller \
            -n ingress-nginx --timeout=300s

      # ===============================
      # Aplicar Ingress
      # ===============================
      - name: Apply App Ingress
        run: |
          envsubst < $K8S_INGRESS_DIR/blockchain-ingress.yaml | kubectl apply -f -

      - name: Apply Grafana Ingress
        run: |
          envsubst < $K8S_MONITORING_DIR/grafana-ingress.yaml | kubectl apply -f -

      # ====================================
      # Monitoring
      # ====================================

      - name: Add Helm repos
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo update

      # Prometheus + Grafana
      - name: Install kube-prometheus-stack
        run: |
          helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
                -n monitoring \
                --create-namespace \
                -f $K8S_MONITORING_DIR/values-prometheus.yaml


      # Loki
      - name: Install Loki
        run: |
          helm upgrade --install loki \
            grafana/loki \
            -n monitoring \
            -f $K8S_MONITORING_DIR/values-loki.yaml

      # Promtail
      - name: Install Promtail
        run: |
          helm upgrade --install promtail \
            grafana/promtail \
            -n monitoring \
            -f $K8S_MONITORING_DIR/values-promtail.yaml


      # Esperar Grafana
      - name: Wait for Grafana
        run: |
          kubectl wait --for=condition=Available deployment/kube-prometheus-stack-grafana \
                -n monitoring --timeout=300s

      # ====================================
      # Ingress de Grafana y Prometheus
      # ====================================
      - name: Apply Grafana Ingress
        run: |
          envsubst < $K8S_MONITORING_DIR/grafana-ingress.yaml | kubectl apply -f -

      - name: Apply Prometheus Ingress
        run: |
          envsubst < $K8S_MONITORING_DIR/prometheus-ingress.yaml | kubectl apply -f -

      # ====================================
      # Aplicar ServiceMonitors
      # ====================================
      - name: Apply ServiceMonitors
        run: |
          kubectl apply -f $K8S_MONITORING_DIR/servicemonitors/

      # ====================================
      # Verificación final
      # ====================================
      - name: Verify Core
        run: |
          kubectl get pods -n blockchain-infra

      - name: Verify Monitoring
        run: |
          kubectl get pods -n monitoring
          kubectl get svc -n monitoring

      - name: Verify NGINX IP
        run: |
          kubectl get svc -n ingress-nginx

      # Output final
      - name: Show access URLs
        run: |
          echo "Coordinator: http://coordinator.${INGRESS_IP}.nip.io"
          echo "Pool Manager: http://pool.${INGRESS_IP}.nip.io"
          echo "Grafana: http://grafana.${INGRESS_IP}.nip.io"
          echo "Prometheus: http://prometheus.${INGRESS_IP}.nip.io"
